<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound of the Internet — Shodan Sonification</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --purple: #6366f1;
  --cyan: #06b6d4;
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a2e;
  --text: #e2e8f0;
  --text-dim: #64748b;
  --danger: #ef4444;
  --warning: #f59e0b;
  --success: #10b981;
}
body {
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
.app { display: flex; flex-direction: column; height: 100vh; }

/* INPUT PANEL */
.input-panel {
  background: var(--surface);
  border-bottom: 1px solid var(--purple);
  padding: 12px 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  box-shadow: 0 4px 20px rgba(99,102,241,0.1);
}
.input-panel input[type="text"] {
  background: var(--bg);
  border: 1px solid var(--purple);
  color: var(--cyan);
  padding: 8px 14px;
  border-radius: 4px;
  font-family: inherit;
  font-size: 14px;
  flex: 1; min-width: 200px;
}
.input-panel input[type="text"]::placeholder { color: var(--text-dim); }
.input-panel input[type="text"]:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 10px rgba(6,182,212,0.3); }
.btn {
  background: linear-gradient(135deg, var(--purple), #4f46e5);
  color: white; border: none; padding: 8px 16px;
  border-radius: 4px; cursor: pointer; font-family: inherit;
  font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
  transition: all 0.2s;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(99,102,241,0.4); }
.btn:active { transform: translateY(0); }
.btn-cyan { background: linear-gradient(135deg, var(--cyan), #0891b2); }
.btn-small { padding: 6px 10px; font-size: 10px; }
.btn-danger { background: linear-gradient(135deg, var(--danger), #dc2626); }
.presets { display: flex; gap: 6px; flex-wrap: wrap; }
.controls-row { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
.control-group { display: flex; align-items: center; gap: 6px; }
.control-group label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.control-group select, .control-group input[type="range"] {
  background: var(--bg); border: 1px solid var(--purple);
  color: var(--text); padding: 4px 8px; border-radius: 3px;
  font-family: inherit; font-size: 11px;
}
input[type="range"] { -webkit-appearance: none; height: 4px; border-radius: 2px; cursor: pointer; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--cyan); }

/* MAIN AREA */
.main-area { display: flex; flex: 1; overflow: hidden; }

/* VISUALIZER */
.visualizer-container {
  flex: 1; position: relative; display: flex; flex-direction: column;
}
#visualizer {
  width: 100%; flex: 1; display: block;
}
.host-overlay {
  position: absolute; top: 20px; left: 20px;
  background: rgba(10,10,15,0.85);
  border: 1px solid var(--purple);
  border-radius: 6px; padding: 12px 16px;
  font-size: 11px; max-width: 300px;
  backdrop-filter: blur(5px);
}
.host-overlay .ip { color: var(--cyan); font-size: 16px; font-weight: bold; }
.host-overlay .org { color: var(--text-dim); }
.host-overlay .ports { color: var(--purple); margin-top: 4px; }
.host-overlay .cves { color: var(--danger); margin-top: 2px; }
.host-overlay .location { color: var(--success); margin-top: 2px; }

/* NOW PLAYING */
.now-playing {
  background: var(--surface);
  border-top: 1px solid var(--purple);
  padding: 10px 20px;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
}
.transport { display: flex; gap: 8px; align-items: center; }
.transport button {
  background: var(--surface2); border: 1px solid var(--purple);
  color: var(--text); width: 32px; height: 32px; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.2s;
}
.transport button:hover { background: var(--purple); }
.transport button.active { background: var(--cyan); color: var(--bg); }
.now-info { flex: 1; font-size: 11px; }
.now-info .label { color: var(--text-dim); }
.now-info .value { color: var(--cyan); }
.progress-text { color: var(--text-dim); font-size: 11px; }
.volume-control { display: flex; align-items: center; gap: 6px; }
.volume-control label { font-size: 10px; color: var(--text-dim); }

/* DATA PANEL */
.data-panel {
  width: 0; overflow: hidden; transition: width 0.3s;
  background: var(--surface); border-left: 1px solid var(--purple);
}
.data-panel.open { width: 320px; }
.data-panel-inner { width: 320px; padding: 12px; overflow-y: auto; height: 100%; }
.data-panel h3 { color: var(--cyan); font-size: 12px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.host-table { width: 100%; font-size: 10px; border-collapse: collapse; }
.host-table th { color: var(--text-dim); text-align: left; padding: 4px 6px; border-bottom: 1px solid var(--surface2); }
.host-table td { padding: 4px 6px; border-bottom: 1px solid var(--surface2); }
.host-table tr.active { background: rgba(99,102,241,0.2); }
.host-table tr:hover { background: rgba(6,182,212,0.1); }
.toggle-panel {
  position: absolute; right: 0; top: 50%;
  transform: translateY(-50%);
  background: var(--surface2); border: 1px solid var(--purple);
  color: var(--text); padding: 8px 4px; cursor: pointer;
  border-radius: 4px 0 0 4px; font-size: 10px; z-index: 10;
}
.mini-map { width: 100%; height: 120px; margin-top: 10px; border: 1px solid var(--surface2); border-radius: 4px; }
.note-mapping { margin-top: 10px; font-size: 10px; }
.note-mapping .mapping-row { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid var(--surface2); }
.note-mapping .port-col { color: var(--cyan); }
.note-mapping .note-col { color: var(--purple); }

@media (max-width: 768px) {
  .input-panel { padding: 8px 12px; }
  .data-panel.open { width: 260px; }
  .host-overlay { max-width: 200px; font-size: 10px; }
}
</style>
</head>
<body>
<div class="app">
  <!-- INPUT PANEL -->
  <div class="input-panel">
    <input type="text" id="queryInput" placeholder="IP, CIDR range, or Shodan query (e.g. 'apache', 'port:445 country:US')">
    <button class="btn" id="sonifyBtn">⚡ SONIFY</button>
    <div class="presets">
      <button class="btn btn-small btn-cyan" data-preset="random">Random IP</button>
      <button class="btn btn-small btn-cyan" data-preset="scada">Industrial SCADA</button>
      <button class="btn btn-small btn-cyan" data-preset="healthcare">Healthcare</button>
      <button class="btn btn-small btn-cyan" data-preset="fortune500">Fortune 500</button>
      <button class="btn btn-small btn-cyan" data-preset="iot">IoT Devices</button>
      <button class="btn btn-small btn-cyan" data-preset="darkweb">Dark Web</button>
    </div>
    <div class="controls-row">
      <div class="control-group">
        <label>Tempo</label>
        <input type="range" id="tempoSlider" min="60" max="180" value="90">
        <span id="tempoValue" style="font-size:11px;color:var(--cyan);">90</span>
      </div>
      <div class="control-group">
        <label>Scale</label>
        <select id="scaleSelect">
          <option value="pentatonic">Pentatonic (dreamy)</option>
          <option value="minor" selected>Minor (dark)</option>
          <option value="chromatic">Chromatic (chaotic)</option>
          <option value="lydian">Lydian (sci-fi)</option>
        </select>
      </div>
    </div>
  </div>

  <!-- MAIN AREA -->
  <div class="main-area">
    <div class="visualizer-container">
      <canvas id="visualizer"></canvas>
      <div class="host-overlay" id="hostOverlay" style="display:none;">
        <div class="ip" id="overlayIp">—</div>
        <div class="org" id="overlayOrg">—</div>
        <div class="location" id="overlayLocation">—</div>
        <div class="ports" id="overlayPorts">—</div>
        <div class="cves" id="overlayCves">—</div>
      </div>
      <button class="toggle-panel" id="togglePanel">◀</button>
    </div>
    <div class="data-panel" id="dataPanel">
      <div class="data-panel-inner">
        <h3>Scan Results</h3>
        <table class="host-table" id="hostTable">
          <thead><tr><th>#</th><th>IP</th><th>Ports</th><th>Country</th></tr></thead>
          <tbody></tbody>
        </table>
        <h3 style="margin-top:12px;">Port → Note Mapping</h3>
        <div class="note-mapping" id="noteMapping"></div>
        <h3 style="margin-top:12px;">Host Locations</h3>
        <canvas class="mini-map" id="miniMap"></canvas>
      </div>
    </div>
  </div>

  <!-- NOW PLAYING -->
  <div class="now-playing">
    <div class="transport">
      <button id="playPauseBtn" title="Play/Pause">▶</button>
      <button id="skipBtn" title="Skip">⏭</button>
      <button id="loopBtn" title="Loop">🔁</button>
      <button id="recordBtn" title="Record" class="btn-danger-border">⏺</button>
    </div>
    <div class="now-info">
      <span class="label">NOW: </span>
      <span class="value" id="nowIp">—</span>
      <span class="label"> | </span>
      <span class="value" id="nowOrg">—</span>
      <span class="label"> | </span>
      <span class="value" id="nowCountry">—</span>
    </div>
    <div class="progress-text" id="progressText">Ready</div>
    <div class="volume-control">
      <label>VOL</label>
      <input type="range" id="volumeSlider" min="0" max="100" value="70">
    </div>
  </div>
</div>

// ============ APP STATE ============
let audioCtx = null;
let masterGain = null;
let analyser = null;
let hosts = [];
let currentHostIndex = 0;
let isPlaying = false;
let isLooping = true;
let tempo = 90;
let currentScale = 'minor';
let animationId = null;
let scheduledNotes = [];
let nextNoteTime = 0;
let measureStartTime = 0;
let particles = [];
let constellationPoints = [];
let mediaRecorder = null;
let isRecording = false;
let recordedChunks = [];

// ============ INIT ============
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.7;
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);
}

// ============ SONIFICATION ENGINE ============
function getFrequency(port) {
  const scale = SCALES[currentScale];
  let noteName = PORT_NOTE_MAP[port];
  if (!noteName) {
    const idx = port % scale.length;
    noteName = scale[idx];
  }
  return NOTE_FREQS[noteName] || 220;
}

function getNoteName(port) {
  const scale = SCALES[currentScale];
  let noteName = PORT_NOTE_MAP[port];
  if (!noteName) {
    const idx = port % scale.length;
    noteName = scale[idx];
  }
  return noteName || '?';
}

function getProtocol(port) {
  return PORT_PROTOCOL[port] || 'Unknown';
}

function getOscType(protocol) {
  switch(protocol) {
    case 'HTTP': case 'HTTPS': case 'IMAPS': return 'sine';
    case 'SSH': return 'triangle';
    case 'FTP': return 'sawtooth';
    case 'SMB': return 'square';
    case 'SMTP': case 'POP3': case 'IMAP': return 'sine'; // + vibrato
    case 'RDP': case 'VNC': return 'sawtooth'; // detuned
    case 'Telnet': return 'sine'; // bitcrushed
    case 'Modbus': case 'S7': case 'EtherNet/IP': return 'sawtooth';
    case 'DICOM': case 'HL7': return 'sine';
    case 'MQTT': case 'MQTTS': case 'CoAP': return 'triangle';
    case 'Tor': return 'square';
    default: return 'sine';
  }
}

function getProtocolColor(protocol) {
  switch(protocol) {
    case 'HTTP': case 'HTTPS': return '#06b6d4';
    case 'SSH': return '#10b981';
    case 'FTP': return '#f59e0b';
    case 'SMB': return '#ef4444';
    case 'SMTP': case 'POP3': case 'IMAP': return '#8b5cf6';
    case 'RDP': case 'VNC': return '#ec4899';
    case 'Telnet': return '#ef4444';
    case 'Modbus': case 'S7': case 'EtherNet/IP': return '#f97316';
    case 'DICOM': case 'HL7': return '#6ee7b7';
    case 'MQTT': case 'MQTTS': case 'CoAP': return '#a78bfa';
    case 'Tor': return '#1e1b4b';
    default: return '#64748b';
  }
}

function getMaxCVE(host) {
  if (!host.cves || host.cves.length === 0) return 0;
  return Math.max(...host.cves.map(c => c.score));
}

function playNote(freq, oscType, protocol, startTime, duration, pan, cveScore, host) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  const panner = audioCtx.createStereoPanner();
  const filter = audioCtx.createBiquadFilter();

  osc.type = oscType;
  osc.frequency.value = freq;
  panner.pan.value = Math.max(-1, Math.min(1, pan));

  filter.type = 'lowpass';
  filter.frequency.value = 2000 + (1 - cveScore/10) * 6000;
  filter.Q.value = 1 + cveScore * 0.5;

  // Envelope
  gainNode.gain.setValueAtTime(0, startTime);
  gainNode.gain.linearRampToValueAtTime(0.3, startTime + 0.02);
  gainNode.gain.exponentialRampToValueAtTime(0.15, startTime + duration * 0.3);
  gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

  // Protocol-specific effects
  if (protocol === 'SMTP' || protocol === 'POP3' || protocol === 'IMAP') {
    // Vibrato
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value = 5;
    lfoGain.gain.value = 3;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    lfo.start(startTime);
    lfo.stop(startTime + duration);
  }

  if (protocol === 'RDP' || protocol === 'VNC') {
    // Detune
    osc.detune.value = -15;
    const osc2 = audioCtx.createOscillator();
    osc2.type = 'sawtooth';
    osc2.frequency.value = freq * 1.005;
    osc2.detune.value = 15;
    const g2 = audioCtx.createGain();
    g2.gain.setValueAtTime(0, startTime);
    g2.gain.linearRampToValueAtTime(0.15, startTime + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc2.connect(g2);
    g2.connect(filter);
    osc2.start(startTime);
    osc2.stop(startTime + duration);
  }

  // CVE effects
  if (cveScore >= 7) {
    // Distortion via waveshaper
    const waveshaper = audioCtx.createWaveShaper();
    const amount = cveScore >= 9 ? 80 : 40;
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) {
      const x = (i * 2) / 256 - 1;
      curve[i] = (Math.PI + amount) * x / (Math.PI + amount * Math.abs(x));
    }
    waveshaper.curve = curve;
    osc.connect(gainNode);
    gainNode.connect(waveshaper);
    waveshaper.connect(filter);
  } else {
    osc.connect(gainNode);
    gainNode.connect(filter);
  }

  if (cveScore >= 7) {
    // Tremolo
    const tremolo = audioCtx.createOscillator();
    const tremoloGain = audioCtx.createGain();
    tremolo.frequency.value = cveScore >= 9 ? 12 : 6;
    tremoloGain.gain.value = 0.3;
    tremolo.connect(tremoloGain);
    tremoloGain.connect(gainNode.gain);
    tremolo.start(startTime);
    tremolo.stop(startTime + duration);
  }

  if (cveScore >= 4 && cveScore < 7) {
    // Filter sweep
    filter.frequency.setValueAtTime(800, startTime);
    filter.frequency.linearRampToValueAtTime(4000, startTime + duration * 0.5);
    filter.frequency.linearRampToValueAtTime(800, startTime + duration);
  }

  filter.connect(panner);
  panner.connect(masterGain);

  osc.start(startTime);
  osc.stop(startTime + duration);

  // Spawn particle
  const color = getProtocolColor(protocol);
  setTimeout(() => {
    spawnParticle(freq, color, cveScore);
  }, Math.max(0, (startTime - audioCtx.currentTime) * 1000));
}

function sonifyHost(host, startTime) {
  const ports = host.ports || [];
  const numPorts = ports.length;
  const cveScore = getMaxCVE(host);
  const pan = host.lon ? host.lon / 180 : 0;
  const measureDuration = (60 / tempo) * 4; // 4 beats per measure

  if (numPorts <= 3) {
    // Sparse ambient pads
    ports.forEach((port, i) => {
      const freq = getFrequency(port);
      const protocol = getProtocol(port);
      const oscType = getOscType(protocol);
      const noteStart = startTime + (i * measureDuration / Math.max(numPorts, 1));
      const noteDur = measureDuration * 0.8;
      playNote(freq, oscType, protocol, noteStart, noteDur, pan, cveScore, host);
    });
  } else if (numPorts <= 7) {
    // Rhythmic arpeggios
    const beatDur = 60 / tempo;
    ports.forEach((port, i) => {
      const freq = getFrequency(port);
      const protocol = getProtocol(port);
      const oscType = getOscType(protocol);
      const noteStart = startTime + (i * beatDur * (4 / numPorts));
      const noteDur = beatDur * 0.7;
      playNote(freq, oscType, protocol, noteStart, noteDur, pan, cveScore, host);
    });
  } else {
    // Dense rapid sequences
    const sixteenth = (60 / tempo) / 4;
    ports.forEach((port, i) => {
      const freq = getFrequency(port);
      const protocol = getProtocol(port);
      const oscType = getOscType(protocol);
      const noteStart = startTime + (i * sixteenth);
      const noteDur = sixteenth * 0.8;
      playNote(freq, oscType, protocol, noteStart, noteDur, pan + (i % 2 === 0 ? -0.1 : 0.1), cveScore, host);
    });
  }

  // Add sub-bass drone based on host
  const subOsc = audioCtx.createOscillator();
  const subGain = audioCtx.createGain();
  subOsc.type = 'sine';
  subOsc.frequency.value = 40 + (cveScore * 5);
  subGain.gain.setValueAtTime(0, startTime);
  subGain.gain.linearRampToValueAtTime(0.08, startTime + 0.5);
  subGain.gain.setValueAtTime(0.08, startTime + measureDuration - 0.5);
  subGain.gain.linearRampToValueAtTime(0, startTime + measureDuration);
  subOsc.connect(subGain);
  subGain.connect(masterGain);
  subOsc.start(startTime);
  subOsc.stop(startTime + measureDuration);
}

function startPlayback() {
  if (hosts.length === 0) return;
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  isPlaying = true;
  document.getElementById('playPauseBtn').textContent = '⏸';
  measureStartTime = audioCtx.currentTime + 0.1;
  scheduleNextHost();
}

function scheduleNextHost() {
  if (!isPlaying || hosts.length === 0) return;
  const host = hosts[currentHostIndex];
  const measureDuration = (60 / tempo) * 4;

  sonifyHost(host, measureStartTime);
  updateNowPlaying(host);
  updateOverlay(host);
  updateDataPanel();

  // Schedule next
  setTimeout(() => {
    if (!isPlaying) return;
    currentHostIndex++;
    if (currentHostIndex >= hosts.length) {
      if (isLooping) {
        currentHostIndex = 0;
      } else {
        stopPlayback();
        return;
      }
    }
    measureStartTime += measureDuration;
    scheduleNextHost();
  }, measureDuration * 1000);
}

function stopPlayback() {
  isPlaying = false;
  document.getElementById('playPauseBtn').textContent = '▶';
}

function togglePlayPause() {
  if (isPlaying) {
    stopPlayback();
  } else {
    startPlayback();
  }
}

function skipHost() {
  if (hosts.length === 0) return;
  currentHostIndex = (currentHostIndex + 1) % hosts.length;
  if (isPlaying) {
    measureStartTime = audioCtx.currentTime + 0.1;
    const host = hosts[currentHostIndex];
    const measureDuration = (60 / tempo) * 4;
    sonifyHost(host, measureStartTime);
    updateNowPlaying(host);
    updateOverlay(host);
    updateDataPanel();
  }
}

function updateDataPanel() {
  const tbody = document.getElementById('hostTable').querySelector('tbody');
  tbody.innerHTML = hosts.map((h, i) => `
    <tr class="${i === currentHostIndex ? 'active' : ''}">
      <td>${i + 1}</td>

    </tr>
  `).join('');

    mappingDiv.innerHTML = host.ports.map(p => `
      <div class="mapping-row">

        <span class="note-col">${getNoteName(p)} → ${getFrequency(p).toFixed(0)}Hz</span>
      </div>
    `).join('');

  // Mini map

function drawMiniMap() {
  const canvas = document.getElementById('miniMap');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = canvas.offsetHeight * 2;
  ctx.scale(2, 2);
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;

  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, w, h);

  // Simple world outline
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(10, 10, w - 20, h - 20);

  // Grid
  ctx.strokeStyle = '#1a1a2e';
  for (let i = 0; i < 5; i++) {
    const x = 10 + (i / 4) * (w - 20);
    ctx.beginPath(); ctx.moveTo(x, 10); ctx.lineTo(x, h - 10); ctx.stroke();
  }
  for (let i = 0; i < 3; i++) {
    const y = 10 + (i / 2) * (h - 20);
    ctx.beginPath(); ctx.moveTo(10, y); ctx.lineTo(w - 10, y); ctx.stroke();
  }

  // Plot hosts
  hosts.forEach((host, i) => {
    if (host.lon == null || host.lat == null) return;
    const x = 10 + ((host.lon + 180) / 360) * (w - 20);
    const y = 10 + ((90 - host.lat) / 180) * (h - 20);
    ctx.beginPath();
    ctx.arc(x, y, i === currentHostIndex ? 4 : 2, 0, Math.PI * 2);
    ctx.fillStyle = i === currentHostIndex ? '#06b6d4' : '#6366f1';
    ctx.fill();
    if (i === currentHostIndex) {
      ctx.strokeStyle = '#06b6d4';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(x, y, 7, 0, Math.PI * 2);
      ctx.stroke();
    }
  });
}

// ============ VISUALIZER ============
function spawnParticle(freq, color, severity) {
  const angle = Math.random() * Math.PI * 2;
  const speed = 1 + Math.random() * 2;
  particles.push({
    x: 0, y: 0,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life: 1.0,
    decay: 0.01 + severity * 0.005,
    color: color,
    size: 2 + (freq / 200)
  });
}

function initConstellation() {
  constellationPoints = [];
  for (let i = 0; i < 60; i++) {
    constellationPoints.push({
      x: Math.random() * 2 - 1,
      y: Math.random() * 2 - 1,
      z: Math.random(),
      connections: []
    });
  }
  // Connect nearby points
  for (let i = 0; i < constellationPoints.length; i++) {
    for (let j = i + 1; j < constellationPoints.length; j++) {
      const dx = constellationPoints[i].x - constellationPoints[j].x;
      const dy = constellationPoints[i].y - constellationPoints[j].y;
      if (Math.sqrt(dx*dx + dy*dy) < 0.4) {
        constellationPoints[i].connections.push(j);
      }
    }
  }
}

function drawVisualizer() {
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  const w = rect.width;
  const h = rect.height;
  const cx = w / 2;
  const cy = h / 2;

  // Background
  ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
  ctx.fillRect(0, 0, w, h);

  const time = Date.now() / 1000;

  // Constellation background
  ctx.save();
  ctx.translate(cx, cy);
  const rot = time * 0.05;
  ctx.rotate(rot);
  ctx.globalAlpha = 0.3;
  constellationPoints.forEach((p, i) => {
    const px = p.x * (w * 0.4);
    const py = p.y * (h * 0.4);
    ctx.fillStyle = `rgba(99, 102, 241, ${0.3 + p.z * 0.4})`;
    ctx.beginPath();
    ctx.arc(px, py, 1 + p.z, 0, Math.PI * 2);
    ctx.fill();
    // Draw connections
    p.connections.forEach(j => {
      const p2 = constellationPoints[j];
      ctx.strokeStyle = `rgba(99, 102, 241, ${0.1 + p.z * 0.1})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(p2.x * (w * 0.4), p2.y * (h * 0.4));
      ctx.stroke();
    });
  });
  ctx.restore();

  // Audio data
  let dataArray;
  let freqArray;
  if (analyser) {
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(dataArray);
    freqArray = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(freqArray);
  } else {
    dataArray = new Uint8Array(1024).fill(128);
    freqArray = new Uint8Array(1024).fill(0);
  }

  // Circular waveform (radar style)
  const radius = Math.min(w, h) * 0.25;
  const avgFreq = freqArray ? Array.from(freqArray.slice(0, 64)).reduce((a,b) => a+b, 0) / 64 : 0;
  const pulseScale = 1 + (avgFreq / 255) * 0.3;

  ctx.save();
  ctx.translate(cx, cy);

  // Radar rings
  for (let r = 0; r < 3; r++) {
    ctx.strokeStyle = `rgba(99, 102, 241, ${0.1 - r * 0.03})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, radius * pulseScale * (0.5 + r * 0.3), 0, Math.PI * 2);
    ctx.stroke();
  }

  // Waveform circle
  ctx.strokeStyle = '#06b6d4';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#06b6d4';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  const step = Math.floor(dataArray.length / 128);
  for (let i = 0; i < 128; i++) {
    const angle = (i / 128) * Math.PI * 2 - Math.PI / 2;
    const val = (dataArray[i * step] - 128) / 128;
    const r = radius * pulseScale + val * radius * 0.5;
    const x = Math.cos(angle) * r;
    const y = Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Inner glow
  const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, radius * pulseScale);
  gradient.addColorStop(0, `rgba(99, 102, 241, ${0.05 + avgFreq/255 * 0.1})`);
  gradient.addColorStop(1, 'rgba(10, 10, 15, 0)');
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(0, 0, radius * pulseScale, 0, Math.PI * 2);
  ctx.fill();

  // Frequency bars (radial)
  const barCount = 32;
  for (let i = 0; i < barCount; i++) {
    const angle = (i / barCount) * Math.PI * 2 - Math.PI / 2;
    const val = freqArray[i * 4] / 255;
    const barLen = val * radius * 0.6;
    const x1 = Math.cos(angle) * (radius * pulseScale + 5);
    const y1 = Math.sin(angle) * (radius * pulseScale + 5);
    const x2 = Math.cos(angle) * (radius * pulseScale + 5 + barLen);
    const y2 = Math.sin(angle) * (radius * pulseScale + 5 + barLen);
    ctx.strokeStyle = `rgba(6, 182, 212, ${0.3 + val * 0.7})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  ctx.restore();

  // Particles
  particles.forEach((p, i) => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); return; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 5;
    ctx.beginPath();
    ctx.arc(cx + p.x * 20, cy + p.y * 20, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  });

  // Scan line
  const scanAngle = time * 2;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(scanAngle);
  const scanGrad = ctx.createLinearGradient(0, 0, radius * 1.5, 0);
  scanGrad.addColorStop(0, 'rgba(6, 182, 212, 0.3)');
  scanGrad.addColorStop(1, 'rgba(6, 182, 212, 0)');
  ctx.strokeStyle = scanGrad;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(radius * 1.5, 0);
  ctx.stroke();
  ctx.restore();

  animationId = requestAnimationFrame(drawVisualizer);
}

// ============ DATA FETCHING ============
async function fetchData(query) {
  try {
    const resp = await fetch(`http://localhost:5003/api/shodan?query=${encodeURIComponent(query)}`);
    if (resp.ok) {
      const json = await resp.json();
      if (json && json.hosts && json.hosts.length > 0) {
        updateSourceBadge(json.source || 'unknown');
        return json.hosts;
      }
    }
  } catch(e) {}
  updateSourceBadge('simulated');
  return null;
}

function updateSourceBadge(source) {
  let badge = document.getElementById('source-badge');
  if (!badge) {
    badge = document.createElement('div');
    badge.id = 'source-badge';
    badge.style.cssText = 'position:fixed;top:10px;right:10px;padding:4px 12px;border-radius:4px;font-family:monospace;font-size:12px;z-index:9999;';
    document.body.appendChild(badge);
  }
  if (source === 'shodan') {
    badge.textContent = '● LIVE [SHODAN]';
    badge.style.background = '#0f2';
    badge.style.color = '#000';
  } else {
    badge.textContent = '○ SIMULATED';
    badge.style.background = '#fa0';
    badge.style.color = '#000';
  }
}

function getSimulatedData(preset) {
  if (SIMULATED_DATA[preset]) return SIMULATED_DATA[preset];
  return SIMULATED_DATA.random;
}

async function sonify(query, preset) {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  // Try API first, fallback to simulated
  let data = null;
  if (!preset) {
    data = await fetchData(query);
  }
  if (!data) {
    const presetKey = preset || 'random';
    data = getSimulatedData(presetKey);
  }

  hosts = data;
  currentHostIndex = 0;

  if (isPlaying) stopPlayback();
  startPlayback();
  updateDataPanel();
}

// ============ RECORDING ============
function toggleRecording() {
  if (!audioCtx) return;
  if (!isRecording) {
    const dest = audioCtx.createMediaStreamDestination();
    masterGain.connect(dest);
    mediaRecorder = new MediaRecorder(dest.stream);
    recordedChunks = [];
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'audio/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `sound-of-internet-${Date.now()}.webm`;
      a.click();
      masterGain.disconnect(dest);
    };
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('recordBtn').classList.add('active');
    document.getElementById('recordBtn').style.background = '#ef4444';
  } else {
    mediaRecorder.stop();
    isRecording = false;
    document.getElementById('recordBtn').classList.remove('active');
    document.getElementById('recordBtn').style.background = '';
  }
}

// ============ EVENT LISTENERS ============
document.getElementById('sonifyBtn').addEventListener('click', () => {
  const query = document.getElementById('queryInput').value.trim();
  if (query) sonify(query, null);
});

document.getElementById('queryInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    const query = e.target.value.trim();
    if (query) sonify(query, null);
  }
});

document.querySelectorAll('[data-preset]').forEach(btn => {
  btn.addEventListener('click', () => {
    const preset = btn.dataset.preset;
    document.getElementById('queryInput').value = preset === 'random' ? 'random' :
      preset === 'scada' ? 'port:502 product:modbus' :
      preset === 'healthcare' ? 'port:104 product:dicom' :
      preset === 'fortune500' ? 'org:"Fortune 500"' :
      preset === 'iot' ? 'port:1883 product:mqtt' :
      'port:9050 product:tor';
    sonify(null, preset);
  });
});

document.getElementById('tempoSlider').addEventListener('input', (e) => {
  tempo = parseInt(e.target.value);
  document.getElementById('tempoValue').textContent = tempo;
});

document.getElementById('scaleSelect').addEventListener('change', (e) => {
  currentScale = e.target.value;
});

document.getElementById('playPauseBtn').addEventListener('click', togglePlayPause);
document.getElementById('skipBtn').addEventListener('click', skipHost);
document.getElementById('loopBtn').addEventListener('click', () => {
  isLooping = !isLooping;
  document.getElementById('loopBtn').classList.toggle('active', isLooping);
});
document.getElementById('recordBtn').addEventListener('click', toggleRecording);

document.getElementById('volumeSlider').addEventListener('input', (e) => {
  if (masterGain) masterGain.gain.value = e.target.value / 100;
});

document.getElementById('togglePanel').addEventListener('click', () => {
  const panel = document.getElementById('dataPanel');
  panel.classList.toggle('open');
  document.getElementById('togglePanel').textContent = panel.classList.contains('open') ? '▶' : '◀';
});

// Init
initConstellation();
drawVisualizer();
document.getElementById('loopBtn').classList.add('active');
</script>
